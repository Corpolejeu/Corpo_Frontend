<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Vote - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .vote-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .vote-player {
            text-align: center;
            cursor: pointer;
        }

        .vote-player img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ccc;
            transition: border 0.2s;
        }

        .vote-player.selected img {
            border: 4px solid #c0392b;
            box-shadow: 0 0 12px #c0392b;
        }

        .vote-player p {
            margin-top: 8px;
            font-weight: bold;
        }

        #voteTimer {
            font-size: 22px;
            color: #d9534f;
            font-weight: bold;
            margin: 15px 0;
        }

        #validateBtn {
            margin-top: 20px;
            display: none;
        }

        #resultMsg {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #c0392b;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <main class="main vote-container">
        <div class="vote-box" style="text-align:center; padding:20px;">

            <h1>🗳 Vote</h1>
            <p>Votez pour licencier un joueur !</p>
            <div id="voteTimer">⏱ 02:00</div>

            <div id="voteGrid" class="vote-grid">
                <p>Chargement des joueurs…</p>
            </div>

            <button id="validateBtn" class="btn" onclick="submitVote()">Valider mon vote</button>
            <p id="resultMsg"></p>

        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const partyCode = localStorage.getItem("partyCode");
        const playerId = localStorage.getItem("playerId");
        const pseudo = localStorage.getItem("pseudo");

        document.getElementById("userPseudo").textContent = pseudo;

        const roleImages = {
            "Fabien": "fabien.png", "Claire": "claire.png",
            "Pascal": "pascal.png", "Tiff": "tiff.png",
            "Stéphane": "stephane.png", "Cindy": "cindy.png", "Denis": "denis.png",
            "Abdel": "abdel.png",
        };

        let selectedPlayerId = null;

        // ---------------------------------------------------
        // Vérifier si le joueur est vivant
        // ---------------------------------------------------
        (async function checkIfAlive() {
            if (!playerId) return;
            try {
                const r = await fetch(`${API_URL}/party/is_alive/${playerId}`);
                const d = await r.json();
                if (!d.is_alive) {
                    window.location.href = "salle_morts.html";
                }
            } catch (e) { console.error("Erreur cycle de vie :", e); }
        })();

        // ---------------------------------------------------
        // Charger les joueurs vivants
        // ---------------------------------------------------
        async function loadPlayers() {
            try {
                const verifyRes = await fetch(`${API_URL}/party/verify/${partyCode}`);
                const party = await verifyRes.json();
                const res = await fetch(`${API_URL}/party/players/${party.party_id}`);
                const players = await res.json();

                const grid = document.getElementById("voteGrid");
                grid.innerHTML = "";

                const votable = players.filter(p => p.is_alive && p.id !== parseInt(playerId));

                if (votable.length === 0) {
                    grid.innerHTML = "<p>Aucun joueur disponible.</p>";
                    return;
                }

                votable.forEach(p => {
                    const div = document.createElement("div");
                    div.classList.add("vote-player");
                    div.id = `vote-${p.id}`;

                    const img = "joueur1.png"; // Rôles secrets — image neutre
                    div.innerHTML = `
                        <img src="../assets/images/${img}" alt="${p.pseudo}">
                        <p>${p.pseudo}</p>
                    `;

                    div.onclick = () => selectPlayer(p.id, div);
                    grid.appendChild(div);
                });

                document.getElementById("validateBtn").style.display = "block";
            } catch (e) {
                console.error("Erreur chargement joueurs vote :", e);
            }
        }

        function selectPlayer(id, el) {
            document.querySelectorAll(".vote-player").forEach(d => d.classList.remove("selected"));
            el.classList.add("selected");
            selectedPlayerId = id;
        }

        // ---------------------------------------------------
        // Soumettre le vote
        // ---------------------------------------------------
        async function submitVote() {
            if (!selectedPlayerId) {
                alert("Sélectionne un joueur !");
                return;
            }

            document.getElementById("validateBtn").style.display = "none";

            try {
                const res = await fetch(`${API_URL}/party/vote`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        voter_id: parseInt(playerId),
                        target_id: selectedPlayerId,
                        party_code: partyCode
                    })
                });

                if (res.ok) {
                    document.getElementById("resultMsg").textContent = "✅ Vote enregistré !";
                } else {
                    const data = await res.json();
                    alert(data.detail || "Erreur lors du vote");
                    document.getElementById("validateBtn").style.display = "block";
                }
            } catch (e) {
                console.error("Erreur envoi vote :", e);
                document.getElementById("validateBtn").style.display = "block";
            }
        }

        // ---------------------------------------------------
        // Timer 2 minutes
        // ---------------------------------------------------
        let timeLeft = 120;
        const timerEl = document.getElementById("voteTimer");
        const timerInterval = setInterval(() => {
            timeLeft--;
            const min = String(Math.floor(timeLeft / 60)).padStart(2, "0");
            const sec = String(timeLeft % 60).padStart(2, "0");
            timerEl.textContent = `⏱ ${min}:${sec}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerEl.textContent = "Temps écoulé !";
                document.getElementById("validateBtn").style.display = "none";
            }
        }, 1000);

        // ---------------------------------------------------
        // WebSocket
        // ---------------------------------------------------
        const ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${partyCode}?player_id=${playerId}`);

        ws.onmessage = async (event) => {
            const msg = event.data;
            console.log("📩 Signal :", msg);

            if (msg.startsWith("game_over:")) {
                clearInterval(timerInterval);
                const result = msg.split(":")[1];
                window.location.href = result === "victoire_collabs" ? "victoire.html" : result === "match_nul" ? "match_nul.html" : "defaite.html";
                return;
            }

            // Un éliminé a été désigné → stocker et aller sur feedback_defi
            if (msg === "phase:defi_decision") {
                clearInterval(timerInterval);
                await storeVoteResult();
                window.location.href = `feedback_defi.html?code=${partyCode}`;
                return;
            }

            // Élimination directe (joker déjà utilisé) → afficher le rôle puis attendre
            if (msg.startsWith("player_eliminated_direct:")) {
                clearInterval(timerInterval);
                const parts = msg.split(":");
                const ePseudo = parts[1];
                const eRole = parts[2];
                document.getElementById("voteTimer").textContent = "Licenciement immédiat !";
                document.getElementById("resultMsg").innerHTML =
                    `❌ <strong>${ePseudo}</strong> est licencié(e) directement (joker déjà utilisé).<br>
                     Rôle révélé : <strong>${eRole}</strong><br>
                     <em>Le prochain meeting commence dans quelques secondes…</em>`;
                document.getElementById("validateBtn").style.display = "none";
                return;
            }

            // Prochain meeting → aller sur decouverte_role
            if (msg.startsWith("next_meeting:")) {
                window.location.href = `meeting1.html?code=${partyCode}`;
                return;
            }
        };

        // ---------------------------------------------------
        // Stocker la victime du vote pour les écrans suivants
        // ---------------------------------------------------
        async function storeVoteResult() {
            try {
                const res = await fetch(`${API_URL}/party/vote_result/${partyCode}`);
                if (!res.ok) return;
                const data = await res.json();

                if (data.eliminated) {
                    localStorage.setItem("eliminatedPlayerId", data.eliminated.player_id);
                    localStorage.setItem("eliminatedPseudo", data.eliminated.pseudo);
                    localStorage.setItem("eliminatedImg",
                        roleImages[data.eliminated.role] || "joueur1.png");
                }
            } catch (e) {
                console.error("Erreur mise en cache résultat vote :", e);
            }
        }


        // 🔥 Vérifier si le joueur est vivant
        (async function checkAlive() {
            try {
                const res = await fetch(`${API_URL}/party/is_alive/${playerId}`);
                const data = await res.json();
                if (!data.is_alive) {
                    window.location.href = "salle_morts.html";
                }
            } catch (e) { }
        })();

        loadPlayers();
    </script>

</body>

</html>
