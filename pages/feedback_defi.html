<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sursis - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .waiting-box {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            padding: 40px;
            text-align: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #eee;
            border-top-color: #c0392b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .waiting-box h2 {
            color: #c0392b;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .waiting-box p {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <div class="waiting-box">
        <div class="spinner"></div>
        <h2 id="statusTitle">Préparation du défi…</h2>
        <p id="statusDesc">Le défi Corpo est en cours de tirage…</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const partyCode = localStorage.getItem("partyCode");
        const playerId = localStorage.getItem("playerId");
        const pseudo = localStorage.getItem("pseudo");

        document.getElementById("userPseudo").textContent = pseudo;

        let ws = null;
        let defiDrawn = false;

        // ── INIT ──
        async function init() {
            // Vérifier is_alive
            try {
                const res = await fetch(`${API_URL}/party/is_alive/${playerId}`);
                const d = await res.json();
                if (!d.is_alive) { window.location.href = "salle_morts.html"; return; }
            } catch (e) { }

            // Récupérer la victime
            try {
                const res = await fetch(`${API_URL}/party/meeting_victim/${partyCode}`);
                const data = await res.json();

                if (data && data.victim) {
                    localStorage.setItem("eliminatedPlayerId", data.victim.id);
                    localStorage.setItem("eliminatedPseudo", data.victim.pseudo);

                    const isMe = parseInt(playerId) === parseInt(data.victim.id);

                    if (isMe) {
                        document.getElementById("statusTitle").textContent = "⚠️ Tu as été licencié(e) !";
                        document.getElementById("statusDesc").textContent = "Un défi Corpo va être tiré pour toi…";
                    } else {
                        document.getElementById("statusTitle").textContent = `${data.victim.pseudo} est licencié(e)`;
                        document.getElementById("statusDesc").textContent = "Un défi Corpo va être tiré…";
                    }
                } else {
                    window.location.href = `feedback.html?code=${partyCode}&mode=pre_vote`;
                    return;
                }
            } catch (e) { console.error(e); }

            // Connecter WS puis tirer le défi
            connectWS();
        }

        function connectWS() {
            ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${partyCode}?player_id=${playerId}`);

            ws.onopen = async () => {
                // Tout le monde tire le défi via HTTP
                // Le serveur ne tire qu'une fois (idempotent) et le broadcast
                if (!defiDrawn) {
                    defiDrawn = true;
                    try {
                        const vRes = await fetch(`${API_URL}/party/verify/${partyCode}`);
                        const party = await vRes.json();
                        // Seul le HOST appelle draw_defi pour broadcaster
                        if (party.host_id === parseInt(playerId)) {
                            await fetch(`${API_URL}/party/draw_defi/${partyCode}`, { method: "POST" });
                        }
                    } catch (e) { console.error("draw_defi error:", e); }
                }
            };

            ws.onmessage = (event) => {
                const msg = event.data;

                if (msg.startsWith("defi_card:")) {
                    window.location.href = `defi_corpo.html?code=${partyCode}`;
                    return;
                }
                if (msg.startsWith("game_over:")) {
                    const r = msg.split(":")[1];
                    window.location.href = r === "victoire_collabs" ? "victoire.html"
                        : r === "match_nul" ? "match_nul.html"
                            : "defaite.html";
                    return;
                }
                if (msg === "phase:feedback:pre_vote" || msg === "phase:feedback") {
                    window.location.href = `feedback.html?code=${partyCode}&mode=pre_vote`;
                    return;
                }
            };

            ws.onclose = () => setTimeout(connectWS, 1000);
        }

        init();
    </script>
</body>

</html>
