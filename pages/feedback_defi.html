<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sursis - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .waiting-box {
            max-width: 600px;
            margin: 70px auto;
            padding: 40px;
            border-radius: 28px;

            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .5);

            box-shadow:
                0 10px 40px rgba(0, 0, 0, .08),
                0 0 0 1px rgba(255, 255, 255, .5);

            text-align: center;

            position: relative;
            overflow: hidden;
        }


        .waiting-box::before {
            content: "";

            position: absolute;

            width: 180px;
            height: 180px;

            border-radius: 50%;

            background: rgba(192, 57, 43, .08);

            top: -80px;
            right: -80px;
        }


        .waiting-box::after {
            content: "";

            position: absolute;

            width: 140px;
            height: 140px;

            border-radius: 50%;

            background: rgba(243, 156, 18, .08);

            bottom: -60px;
            left: -60px;
        }



        .spinner {

            width: 64px;
            height: 64px;

            border-radius: 50%;

            border: 5px solid rgba(192, 57, 43, .15);

            border-top-color: #ff3131;

            animation: spin .8s linear infinite;

            margin: 0 auto 30px;

        }


        @keyframes spin {

            to {
                transform: rotate(360deg);
            }

        }



        .waiting-box h2 {

            margin: 0 0 14px;

            color: #ff3131;

            font-size: 30px;

            font-weight: 800;

            letter-spacing: -0.5px;

        }



        .waiting-box p {

            margin: 0;

            color: #6b7280;

            font-size: 16px;

            line-height: 1.7;

        }



        .waiting-box ul {

            list-style: none;

            padding: 0;

            margin: 20px 0 0;

        }


        .waiting-box li {

            background: #fafafa;

            border-radius: 14px;

            padding: 14px;

            margin-bottom: 12px;

            border: 1px solid #ececec;

            transition: .2s;

        }


        .waiting-box li:hover {

            transform: translateY(-2px);

            box-shadow: 0 6px 18px rgba(0, 0, 0, .06);

        }



        .waiting-box strong {

            color: #ff3131;

        }



        .spinner.hidden {
            display: none;
        }



        @media(max-width:768px) {

            .waiting-box {

                margin: 30px 16px;

                padding: 28px 22px;

            }


            .waiting-box h2 {

                font-size: 24px;

            }


            .waiting-box p {

                font-size: 14px;

            }


            .spinner {

                width: 52px;
                height: 52px;

            }


        }


        @media(max-width:480px) {

            .waiting-box {

                border-radius: 22px;

                padding: 24px 18px;

            }


            .waiting-box h2 {

                font-size: 21px;

            }


            .waiting-box p {

                font-size: 13px;

            }

        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <div class="waiting-box">
        <div class="spinner"></div>
        <h2 id="statusTitle">Préparation du défi…</h2>
        <p id="statusDesc">Le défi Corpo est en cours de tirage…</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const partyCode = localStorage.getItem("partyCode");
        const playerId = parseInt(localStorage.getItem("playerId"));
        const pseudo = localStorage.getItem("pseudo");

        document.getElementById("userPseudo").textContent = pseudo;

        let ws = null;

        async function init() {
            // 1. Vérifier is_alive
            try {
                const res = await fetch(`${API_URL}/party/is_alive/${playerId}`);
                const d = await res.json();
                if (!d.is_alive) { window.location.href = "salle_morts.html"; return; }
            } catch (e) { }

            // 2. Récupérer la victime DEPUIS L'API (jamais depuis localStorage)
            let victimId = null;
            try {
                const res = await fetch(`${API_URL}/party/meeting_victim/${partyCode}`);
                const data = await res.json();

                if (!data || !data.victim) {
                    console.log("❌ Pas de victime trouvée");
                    return;
                }

                console.log("✅ Victime trouvée :", data.victim.id, data.victim.pseudo);

                victimId = parseInt(data.victim.id);
                // 🔥 FIX : toujours mettre à jour depuis l'API, pas depuis localStorage
                localStorage.setItem("eliminatedPlayerId", data.victim.id);
                localStorage.setItem("eliminatedPseudo", data.victim.pseudo);

                const isMe = playerId === victimId;
                document.getElementById("statusTitle").textContent = isMe
                    ? "⚠️ Tu as été licencié(e) !"
                    : `${data.victim.pseudo} est licencié(e)`;
                document.getElementById("statusDesc").textContent = "Un défi Corpo va être tiré…";

            } catch (e) { console.error(e); return; }

            // 3. Connecter WS
            connectWS();

            // 4. Seul le HOST : marquer draw_corpocard PUIS tirer le défi
            setTimeout(async () => {
                try {
                    const vRes = await fetch(`${API_URL}/party/verify/${partyCode}`);
                    const party = await vRes.json();

                    // 🔥 FIX : si le host est mort, le premier joueur vivant prend le relais
                    const aliveRes = await fetch(`${API_URL}/party/players/${party.party_id}`);
                    const players = await aliveRes.json();
                    const alivePlayers = players.filter(p => p.is_alive);
                    const isOriginalHostAlive = alivePlayers.some(p => p.id === party.host_id);
                    const effectiveHostId = isOriginalHostAlive
                        ? party.host_id
                        : (alivePlayers[0]?.id || null);

                    if (effectiveHostId === playerId) {
                        if (victimId) {
                            await fetch(`${API_URL}/party/draw_corpocard/${victimId}`, { method: "POST" });
                        }
                        const r = await fetch(`${API_URL}/party/draw_defi/${partyCode}`, { method: "POST" });
                        if (!r.ok) {
                            console.error("draw_defi error:", r.status, await r.text());
                        }
                    }
                } catch (e) { console.error("draw_defi:", e); }
            }, 3000);
        }

        function connectWS() {
            ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${partyCode}?player_id=${playerId}`);

            ws.onmessage = (event) => {
                const msg = event.data;

                if (msg.startsWith("licenciements_recap:")) {
                    try {
                        const victims = JSON.parse(msg.substring(20));
                        document.getElementById("statusTitle").textContent = "🚨 Licenciements ce meeting";
                        let html = "<ul style='text-align:left;margin-top:10px;'>";
                        victims.forEach((v, i) => {
                            const jokerText = v.has_joker ? "⚔️ Défi en attente" : "💀 Éliminé direct";
                            html += `<li style="margin:8px 0;font-size:14px;">
                <strong>${i + 1}. ${v.pseudo}</strong> — ${v.reason}<br>
                <span style="color:${v.has_joker ? '#c0392b' : '#888'}">${jokerText}</span>
            </li>`;
                        });
                        html += "</ul>";
                        document.getElementById("statusDesc").innerHTML = html;
                        // 🔥 FIX : stocker le recap pour que la victime soit connue même si phase:defi_decision arrive avant
                        window._victimsList = victims;
                    } catch (e) { }
                    return;
                }

                if (msg.startsWith("abdel_reveal:")) {
                    const parts = msg.split(":");
                    document.getElementById("statusTitle").textContent = `🦠 ${parts[1]} était Abdel !`;
                    document.getElementById("statusDesc").textContent = `Victimes infectées : ${parts[2]} → licenciement en cours !`;
                    document.querySelector(".spinner").style.display = "none";
                    return;
                }

                if (msg.startsWith("player_eliminated_direct:")) {
                    const parts = msg.split(":");
                    document.getElementById("statusTitle").textContent = `❌ ${parts[1]} est licencié(e) !`;
                    document.getElementById("statusDesc").textContent = `Rôle révélé : ${parts[2]}`;
                    document.querySelector(".spinner").style.display = "none";
                    return;
                }

                if (msg === "phase:defi_decision") {
                    document.getElementById("statusTitle").textContent = "⏳ Prochain défi en préparation…";
                    document.getElementById("statusDesc").textContent = "Redirection dans un instant…";
                    document.querySelector(".spinner").style.display = "block";
                    setTimeout(() => {
                        window.location.href = `feedback_defi.html?code=${partyCode}`;
                    }, 2000);
                    return;
                }

                if (msg.startsWith("defi_card:")) {
                    window.location.href = `defi_corpo.html?code=${partyCode}`;
                    return;
                }
                if (msg.startsWith("game_over:")) {
                    const r = msg.split(":")[1];
                    window.location.href = r === "victoire_collabs" ? "victoire.html"
                        : r === "match_nul" ? "match_nul.html"
                            : "defaite.html";
                    return;
                }
                if (msg === "phase:feedback:pre_vote" || msg === "phase:feedback") {
                    window.location.href = `feedback.html?code=${partyCode}&mode=pre_vote`;
                    return;
                }
            };

            ws.onclose = () => setTimeout(connectWS, 1000);
        }

        init();
    </script>
    <script src="../assets/js/translate.js"></script>
</body>

</html>
