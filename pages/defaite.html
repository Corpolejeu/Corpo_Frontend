<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Défaite - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .result-emoji { font-size: 80px; margin: 10px 0; }
        .defaite-box { text-align: center; padding: 30px; }
        .defaite-img { width: 220px; border-radius: 12px; margin: 15px auto; display: block; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-links">
            <a href="accueil.html">Accueil</a>
            <a href="https://corpolejeu.com/" target="_blank">Site officiel</a>
        </div>
    </div>

    <main class="main defaite-container">
        <div class="defaite-box">
            <h1 id="mainTitle">...</h1>
            <div class="result-emoji" id="emoji">...</div>
            <div class="cho-message">
                <p id="choMsg"><strong>CHO :</strong> ...</p>
            </div>
            <div class="defaite-center">
                <img id="resultImg" src="" class="defaite-img" alt="Résultat">
                <p id="resultText" class="defaite-text"></p>
            </div>
            <a class="btn defaite-btn" href="accueil.html">Retour à l'accueil</a>
            <a class="btn victoire-btn" href="lobby.html">Rejouer</a>
        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        // defaite.html = les MANAGERS ont gagné (dernier collaborateur éliminé)
        // Donc : Managers → gagnants 😈 | Collaborateurs → perdants 😭
        const playerId = localStorage.getItem("playerId");
        const API_URL  = "http://127.0.0.1:8000";

        async function init() {
            let isManager = false;
            try {
                const res  = await fetch(`${API_URL}/party/role/${playerId}`);
                const data = await res.json();
                isManager  = data.team === "Managers";
            } catch (e) {
                const role = localStorage.getItem("lastRole") || "";
                isManager  = ["Fabien"].includes(role);
            }
            render(isManager);
        }

        function render(isManager) {
        const title   = document.getElementById("mainTitle");
        const emoji   = document.getElementById("emoji");
        const choMsg  = document.getElementById("choMsg");
        const img     = document.getElementById("resultImg");
        const text    = document.getElementById("resultText");

        if (isManager) {
            // Le manager a gagné
            title.textContent          = "Victoire !";
            title.style.color          = "#27ae60";
            emoji.textContent          = "😈";
            choMsg.innerHTML           = "<strong>CHO :</strong> Les managers ont pris le contrôle de l'entreprise !";
            img.src                    = "../assets/images/victoire.png";
            text.textContent           = "Brillant. Tu as manipulé tout le monde et licencié chaque collaborateur. L'entreprise t'appartient.";
        } else {
            // Le collaborateur a perdu
            title.textContent          = "Défaite…";
            title.style.color          = "#c0392b";
            emoji.textContent          = "😭";
            choMsg.innerHTML           = "<strong>CHO :</strong> Les managers infiltrés ont pris le contrôle. Vous avez échoué.";
            img.src                    = "../assets/images/defaite.png";
            text.textContent           = "Vous n'avez pas réussi à sauver l'entreprise. Les managers ont pris le contrôle…";
        }
        }
        init();
    </script>
</body>
</html>
