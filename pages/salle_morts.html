<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Salle des morts - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .morts-status {
            background: #f8f9fa;
            border-left: 4px solid #c0392b;
            padding: 12px 18px;
            margin: 15px auto;
            max-width: 400px;
            font-size: 16px;
            color: #555;
        }

        .phase-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0;
            background: #c0392b;
            color: white;
        }

        .eliminated-reveal {
            background: #fdecea;
            border: 2px solid #c0392b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px auto;
            max-width: 400px;
            text-align: center;
        }

        .eliminated-reveal img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #c0392b;
            object-fit: cover;
            margin: 8px auto;
            display: block;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-links"><a href="accueil.html">Accueil</a></div>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <main class="main morts-container">
        <div class="morts-box">

            <h1>Salle des morts</h1>

            <div class="cho-message">
                <p><strong>CHO :</strong> Vous avez été éliminé(e). Vous observez la suite de la partie.</p>
            </div>

            <div class="morts-center">
                <!-- Image du rôle RÉVÉLÉE puisque le joueur est éliminé -->
                <img id="mortsImg" src="../assets/images/joueur1.png" alt="Joueur mort" class="morts-img">
                <p id="myRoleText" style="font-weight:bold; color:#c0392b; font-size:16px;"></p>
                <p class="morts-text">
                    Vous observez désormais la partie…<br>
                    Vous ne pouvez plus agir, voter ou parler.
                </p>
            </div>

            <!-- Annonces d'éliminations en temps réel -->
            <div id="eliminationFeed" style="margin: 15px auto; max-width: 400px;"></div>

            <!-- Phase actuelle -->
            <div class="morts-status">
                <p>Phase actuelle : <span id="currentPhase" class="phase-badge">En attente…</span></p>
                <p id="phaseDetail" style="margin-top:8px; font-style:italic;"></p>
            </div>

            <div class="chat-disabled morts-chat">
                Chat désactivé — vous êtes éliminé
            </div>

        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const partyCode = localStorage.getItem("partyCode");
        const pseudo = localStorage.getItem("pseudo");
        const playerId = localStorage.getItem("playerId");

        document.getElementById("userPseudo").textContent = pseudo;

        const roleImages = {
            "Fabien": "fabien.png", "Claire": "claire.png",
            "La Plante": "plante.png", "Benjamin": "benjamin.png",
            "Pascal": "pascal.png", "Tiff": "tiff.png",
            "Stéphane": "stephane.png", "Cindy": "cindy.png",
            "Denis": "denis.png", "Corentin": "corentin.png", "Abdel": "abdel.png",
        };

        const phaseEl = document.getElementById("currentPhase");
        const detailEl = document.getElementById("phaseDetail");

        // Charger le vrai rôle du joueur éliminé (révélé maintenant)
        async function loadMyRole() {
            try {
                const res = await fetch(`${API_URL}/party/role/${playerId}`);
                const data = await res.json();
                if (data.role_name) {
                    const img = roleImages[data.role_name] || "joueur1.png";
                    document.getElementById("mortsImg").src = `../assets/images/${img}`;
                    document.getElementById("myRoleText").textContent =
                        `Votre rôle : ${data.role_name} (${data.team})`;
                }
            } catch (e) { console.error(e); }
        }

        loadMyRole();

        // Afficher une annonce d'élimination
        function showElimination(pseudo, role) {
            const feed = document.getElementById("eliminationFeed");
            const div = document.createElement("div");
            div.classList.add("eliminated-reveal");
            const img = roleImages[role] || "joueur1.png";
            div.innerHTML = `
                <img src="../assets/images/${img}" alt="${pseudo}">
                <p style="font-weight:bold; font-size:16px;">❌ ${pseudo} a été licencié(e) !</p>
                <p style="color:#c0392b; font-size:14px;">Rôle révélé : <strong>${role}</strong></p>
            `;
            feed.prepend(div);
        }

        // WebSocket
        const ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${partyCode}?player_id=${playerId}`);

        ws.onmessage = (event) => {
            const msg = event.data;

            if (msg === "phase:meeting_start") {
                phaseEl.textContent = "Meeting en cours";
                detailEl.textContent = "Les joueurs font leurs actions secrètes…";
            }
            else if (msg.startsWith("role:")) {
                phaseEl.textContent = "Meeting en cours";
                detailEl.textContent = `Tour de : ${msg.substring(5)}`;
            }
            else if (msg === "phase:feedback:pre_vote" || msg === "phase:feedback") {
                phaseEl.textContent = "Feedback / Débat";
                detailEl.textContent = "Les joueurs débattent des suspects…";
            }
            else if (msg === "phase:vote") {
                phaseEl.textContent = "Vote";
                detailEl.textContent = "Les joueurs votent pour licencier quelqu'un…";
            }
            else if (msg === "phase:defi_decision") {
                phaseEl.textContent = "Défi Corpo";
                detailEl.textContent = "Un joueur doit décider s'il relève le défi…";
            }
            else if (msg === "phase:defi_corpo") {
                phaseEl.textContent = "Défi Corpo en cours";
                detailEl.textContent = "Un joueur réalise son défi !";
            }
            // 🔥 Annonce immédiate d'élimination directe
            else if (msg.startsWith("player_eliminated_direct:")) {
                const parts = msg.split(":");
                showElimination(parts[1], parts[2]);
                detailEl.textContent = `${parts[1]} a été licencié(e) directement !`;
            }
            else if (msg.startsWith("egalite_defis:")) {
                phaseEl.textContent = "Égalité !";
                detailEl.textContent = `Égalité ! ${msg.substring(14)} vont faire leur défi.`;
            }
            else if (msg.startsWith("next_meeting:")) {
                // 🔥 Les morts restent ici — juste mettre à jour l'affichage
                phaseEl.textContent = "Nouveau meeting";
                detailEl.textContent = `Meeting ${msg.split(":")[1]} en cours… Vous observez.`;
                // PAS de redirection — les éliminés restent dans la salle des morts
            }
            else if (msg.startsWith("game_over:")) {
                const result = msg.split(":")[1];
                window.location.href = result === "victoire_collabs" ? "victoire.html"
                    : result === "match_nul" ? "match_nul.html"
                        : "defaite.html";
            }
        };

        ws.onclose = () => {
            detailEl.textContent = "Connexion perdue… Rechargez la page.";
        };
    </script>

</body>

</html>
