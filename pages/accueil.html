<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Accueil - Corpo!</title>

    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        .login-box {

            max-width: 500px;

            margin: 60px auto;

        }


        .pseudo-zone {

            display: none;

            margin-top: 15px;

        }


        #statusMsg {

            font-size: 14px;

            font-weight: 600;

            margin-top: 12px;

            min-height: 20px;

        }


        .success {

            color: #27ae60;

        }


        .error {

            color: #ff3131;

        }



        .connected-box {

            display: none;

            margin-top: 15px;

        }


        .connected-box h2 {

            font-size: 30px;

            font-weight: 800;

            color: #ff3131;

            margin-bottom: 10px;

        }


        .connected-box p {

            font-size: 15px;

            color: #666;

            margin-bottom: 25px;

        }



        .nav-user {

            display: flex;

            align-items: center;

            gap: 15px;

        }



        #logoutBtn {

            padding: 10px 18px;

            border: none;

            border-radius: 12px;

            cursor: pointer;

            font-weight: 700;

            background: #ffe4e4;

            color: #ff3131;

            transition: .25s;

        }


        #logoutBtn:hover {

            background: #ff3131;

            color: white;

        }



        .big-btn {

            margin-top: 15px;

        }
    </style>

</head>

<body>


    <div class="navbar">

        <a href="accueil.html" class="logo">

            Corpo! Le jeu

        </a>



        <div class="nav-user">


            <span id="userPseudo"></span>

            <button id="logoutBtn" onclick="logout()">

                Déconnexion

            </button>

        </div>

    </div>



    <main class="main">


        <div class="box login-box">



            <div id="zoneLogin">


                <h1>

                    Bienvenue 👋

                </h1>

                <p>

                    Le jeu de bluff en entreprise

                </p>


                <input type="email" id="emailInput" placeholder="Ton adresse email...">


                <div id="statusMsg"></div>



                <div class="pseudo-zone" id="pseudoZone">

                    <input type="text" id="pseudoInput" placeholder="Choisis un pseudo..." maxlength="20">

                </div>



                <button class="btn" id="mainBtn" onclick="handleLogin()">

                    Continuer

                </button>



            </div>





            <div class="connected-box" id="zoneConnected">


                <h2>

                    Bonjour

                    <span id="connectedPseudo"></span>

                    👋

                </h2>



                <p>

                    Prêt à licencier ton meilleur collègue ? Ou à te faire virer ? 😈

                </p>



                <button class="btn" onclick="window.location.href='creer_partie.html'">

                    🏢 Créer un meeting

                </button>




                <button class="btn big-btn" onclick="window.location.href='rejoindre_partie.html'">

                    🚪 Rejoindre un meeting

                </button>


            </div>


        </div>

    </main>



    <script>

        const API_URL = "https://corpo-backend.onrender.com";

        let emailVerified = false;



        const savedPseudo = localStorage.getItem("pseudo");


        if (savedPseudo) {

            document.getElementById("zoneLogin").style.display = "none";

            document.getElementById("zoneConnected").style.display = "block";

            document.getElementById("connectedPseudo").textContent = savedPseudo;

            document.getElementById("userPseudo").textContent = savedPseudo;

        }


        async function handleLogin() {


            const email = document.getElementById("emailInput").value.trim();

            const status = document.getElementById("statusMsg");


            if (!email) {

                showStatus(

                    "Entre ton email !",

                    "error"

                );

                return;

            }



            if (!emailVerified) {


                showStatus(

                    "Vérification...",

                    ""

                );


                try {


                    const res = await fetch(

                        `${API_URL}/account/check_email`,

                        {

                            method: "POST",

                            headers: {

                                "Content-Type": "application/json"

                            },

                            body: JSON.stringify({

                                email

                            })

                        }

                    );



                    const data = await res.json();



                    if (data.exists) {


                        localStorage.setItem(

                            "pseudo",

                            data.pseudo

                        );


                        localStorage.setItem(

                            "playerId",

                            data.player_id

                        );



                        showStatus(

                            "Connexion réussie !",

                            "success"

                        );


                        setTimeout(() => {

                            window.location.reload();

                        }, 1000);


                        return;

                    }



                    emailVerified = true;


                    showStatus(

                        "Nouveau joueur ? Choisis un pseudo !",

                        "success"

                    );


                    document.getElementById(

                        "pseudoZone"

                    ).style.display = "block";


                    document.getElementById(

                        "mainBtn"

                    ).textContent = "Créer mon compte";


                }

                catch (e) {

                    showStatus(

                        "Erreur serveur.",

                        "error"

                    );

                }

                return;

            }



            const pseudo = document.getElementById(

                "pseudoInput"

            ).value.trim();



            if (!pseudo) {

                showStatus(

                    "Entre un pseudo !",

                    "error"

                );

                return;

            }



            try {


                const res = await fetch(

                    `${API_URL}/account/register`,

                    {

                        method: "POST",

                        headers: {

                            "Content-Type": "application/json"

                        },

                        body: JSON.stringify({

                            email,

                            pseudo

                        })

                    }

                );



                const data = await res.json();



                if (res.ok) {


                    localStorage.setItem(

                        "pseudo",

                        pseudo

                    );


                    localStorage.setItem(

                        "playerId",

                        data.player_id

                    );



                    showStatus(

                        "Compte créé !",

                        "success"

                    );



                    setTimeout(() => {

                        window.location.reload();

                    }, 1000);


                }

                else {


                    showStatus(

                        data.detail ||

                        "Erreur.",

                        "error"

                    );


                }


            }

            catch (e) {

                showStatus(

                    "Connexion impossible.",

                    "error"

                );

            }

        }



        function showStatus(msg, type) {

            const el = document.getElementById(

                "statusMsg"

            );

            el.textContent = msg;

            el.className = type;

        }



        function logout() {

            localStorage.clear();

            window.location.reload();

        }



        document.getElementById(

            "emailInput"

        ).addEventListener(

            "keydown",

            e => {

                if (e.key === "Enter")

                    handleLogin();

            }

        );



        document.getElementById(

            "pseudoInput"

        )?.addEventListener(

            "keydown",

            e => {

                if (e.key === "Enter")

                    handleLogin();

            }

        );

    </script>

</body>

</html>
