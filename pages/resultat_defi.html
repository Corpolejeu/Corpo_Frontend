<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Résultat du défi - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .result-success {
            color: #27ae60;
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0;
        }

        .result-fail {
            color: #c0392b;
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0;
        }

        .defi-rappel {
            background: #f8f9fa;
            border-left: 4px solid #ffc107;
            padding: 12px 18px;
            margin: 15px auto;
            max-width: 420px;
            font-style: italic;
            color: #555;
            font-size: 14px;
            text-align: left;
        }

        .role-revealed {
            font-size: 20px;
            font-weight: bold;
            color: #c0392b;
            margin: 12px 0;
        }

        .nav-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        #waitingSpinner {
            margin: 30px auto;
            font-size: 16px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <main class="main resultat-container">
        <div class="resultat-box" style="text-align:center; padding:20px;">

            <h1>Verdict du Défi</h1>

            <div class="cho-message">
                <p id="choMsg"><strong>CHO :</strong> Analyse du jury en cours…</p>
            </div>

            <img src="../assets/images/joueur1.png" alt="Joueur" class="resultat-img">
            <h2 id="eliminatedName"></h2>
            <div class="defi-rappel" id="defiRappel"></div>

            <!-- Attente du résultat -->
            <div id="waitingSpinner">⏳ En attente du verdict du jury…</div>

            <!-- Résultat -->
            <div id="zoneResult" style="display:none;">
                <p id="resultText"></p>
                <p id="roleReveal" class="role-revealed" style="display:none;"></p>

                <div class="nav-btns" id="navBtns"></div>
            </div>

        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const partyCode = localStorage.getItem("partyCode");
        const playerId = parseInt(localStorage.getItem("playerId"));
        const pseudo = localStorage.getItem("pseudo");
        const eliminatedPseudo = localStorage.getItem("eliminatedPseudo") || "Le joueur";
        const eliminatedPlayerId = parseInt(localStorage.getItem("eliminatedPlayerId"));
        const defiText = localStorage.getItem("currentDefi") || "Défi corpo";

        document.getElementById("userPseudo").textContent = pseudo;
        document.getElementById("eliminatedName").textContent = eliminatedPseudo;
        document.getElementById("defiRappel").textContent = "Défi : " + defiText;

        const iAmEliminated = playerId === eliminatedPlayerId;
        let resultShown = false;

        // --------------------------------------------------
        // Afficher le résultat
        // --------------------------------------------------
        async function showResult(outcome) {
            if (resultShown) return;
            resultShown = true;

            document.getElementById("waitingSpinner").style.display = "none";
            document.getElementById("zoneResult").style.display = "block";

            const choMsg = document.getElementById("choMsg");
            const resultEl = document.getElementById("resultText");
            const roleEl = document.getElementById("roleReveal");
            const navBtns = document.getElementById("navBtns");

            if (outcome === "success") {
                choMsg.innerHTML = "<strong>CHO :</strong> Performance validée par l'équipe !";
                resultEl.textContent = `✅ Défi réussi ! ${eliminatedPseudo} reste dans l'entreprise.`;
                resultEl.className = "result-success";
            } else {
                choMsg.innerHTML = "<strong>CHO :</strong> Performance insuffisante. Licenciement acté.";
                resultEl.textContent = `❌ Défi échoué ! ${eliminatedPseudo} est licencié(e).`;
                resultEl.className = "result-fail";

                // Révéler le rôle
                try {
                    const res = await fetch(`${API_URL}/party/meeting_victim/${partyCode}`);
                    const data = await res.json();
                    if (data.victim && data.victim.role) {
                        roleEl.textContent = `Rôle révélé : ${data.victim.role}`;
                        roleEl.style.display = "block";
                    }
                } catch (e) { }
            }

            // Bouton de continuation — tout le monde le voit
            // C'est le WS qui synchronise la redirection
            const btnNext = document.createElement("button");
            btnNext.className = "btn";
            btnNext.textContent = "Continuer ▶";
            btnNext.onclick = () => {
                btnNext.disabled = true;
                btnNext.textContent = "Synchronisation…";
                // Envoyer le signal de continuation via WS
                // Seul le host effectue la requête API, mais tout le monde peut appuyer
                fetch(`${API_URL}/party/next_phase/${partyCode}`, { method: "POST" }).catch(() => { });
            };
            navBtns.appendChild(btnNext);

            // Nettoyer
            localStorage.removeItem("defiOutcome");
            localStorage.removeItem("currentDefi");
        }

        // --------------------------------------------------
        // Lire depuis localStorage d'abord (si déjà reçu dans defi_corpo)
        // --------------------------------------------------
        const storedOutcome = localStorage.getItem("defiOutcome");
        if (storedOutcome) {
            setTimeout(() => showResult(storedOutcome), 400);
        }

        // --------------------------------------------------
        // WebSocket — fallback + redirections de phase
        // --------------------------------------------------
        const ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${partyCode}?player_id=${playerId}`);

        ws.onmessage = (event) => {
            const msg = event.data;

            if (msg.startsWith("defi_result:") && !resultShown) {
                const outcome = msg.split(":")[1];
                showResult(outcome);
                return;
            }

            // Le backend a déclenché la suite → tout le monde redirigé
            if (msg === "phase:feedback:pre_vote" || msg === "phase:feedback") {
                localStorage.removeItem("defiOutcome");
                localStorage.removeItem("currentDefi");
                window.location.href = `feedback.html?code=${partyCode}&mode=pre_vote`;
                return;
            }
            if (msg.startsWith("next_meeting:")) {
                localStorage.removeItem("defiOutcome");
                localStorage.removeItem("currentDefi");
                window.location.href = `meeting1.html?code=${partyCode}`;
                return;
            }
            if (msg.startsWith("game_over:")) {
                const r = msg.split(":")[1];
                window.location.href = r === "victoire_collabs" ? "victoire.html"
                    : r === "match_nul" ? "match_nul.html"
                        : "defaite.html";
                return;
            }
        };
    </script>
</body>

</html>
