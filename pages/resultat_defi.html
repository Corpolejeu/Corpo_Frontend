<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Résultat du défi - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .result-success {
            color: #27ae60;
            font-size: 24px;
            font-weight: bold;
        }

        .result-fail {
            color: #c0392b;
            font-size: 24px;
            font-weight: bold;
        }

        .defi-rappel {
            background: #f8f9fa;
            border-left: 4px solid #ffc107;
            padding: 12px 18px;
            margin: 15px auto;
            max-width: 420px;
            font-style: italic;
            color: #555;
            font-size: 14px;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <main class="main resultat-container">
        <div class="resultat-box" style="text-align:center; padding:20px;">

            <h1>Verdict du Défi</h1>

            <div class="cho-message">
                <p id="choMsg"><strong>CHO :</strong> Analyse du feedback en cours…</p>
            </div>

            <img id="eliminatedImg" src="../assets/images/joueur1.png" alt="Joueur" class="resultat-img">
            <h2 id="eliminatedName">...</h2>

            <div class="defi-rappel" id="defiRappel"></div>

            <!-- En attente du résultat -->
            <div id="zoneWaiting">
                <p style="color:#888; font-style:italic; margin-top:20px;">
                    ⏳ Récupération du verdict…
                </p>
            </div>

            <!-- Résultat affiché -->
            <div id="zoneResult" style="display:none; margin-top:30px;">
                <p id="resultText"></p>
                <div id="roleRevelationZone"></div>

                <div style="margin-top:25px;">
                    <!-- Seul le host voit le bouton "Continuer" -->
                    <button id="btnNextStep" class="btn" style="display:none;">
                        Continuer ▶
                    </button>
                    <p id="waitingNext" style="display:none; color:#888; font-style:italic;">
                        ⏳ En attente de la suite…
                    </p>
                </div>
            </div>

        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const partyCode = localStorage.getItem("partyCode");
        const playerId = localStorage.getItem("playerId");
        const pseudo = localStorage.getItem("pseudo");
        const eliminatedPseudo = localStorage.getItem("eliminatedPseudo") || "Le collaborateur";
        const eliminatedPlayerId = localStorage.getItem("eliminatedPlayerId");
        const eliminatedImg = localStorage.getItem("eliminatedImg") || "joueur1.png";
        const defiText = localStorage.getItem("currentDefi") || "Défi corpo";

        document.getElementById("userPseudo").textContent = pseudo;
        document.getElementById("eliminatedName").textContent = eliminatedPseudo;
        document.getElementById("eliminatedImg").src = "../assets/images/joueur1.png"; // Image neutre — rôle révélé seulement si échec
        document.getElementById("defiRappel").textContent = "Défi évalué : " + defiText;

        let resultShown = false;
        let nextPhaseCalled = false;
        // ---------------------------------------------------
        // Lire le résultat depuis localStorage (stocké par defi_corpo.html)
        // ---------------------------------------------------
        const storedOutcome = localStorage.getItem("defiOutcome");
        if (storedOutcome) {
            localStorage.removeItem("defiOutcome");
            // Afficher le résultat après un court délai (le temps que la page se charge)
            setTimeout(() => showResult(storedOutcome), 500);
        }

        // ---------------------------------------------------
        // WebSocket — fallback si localStorage vide (reconnexion tardive)
        // ---------------------------------------------------
        const ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${partyCode}?player_id=${playerId}`);

        ws.onmessage = async (event) => {
            const msg = event.data;
            console.log("📩 Signal :", msg);

            if ((msg === "defi_result:success" || msg === "defi_result:fail") && !resultShown) {
                const outcome = msg.split(":")[1];
                await showResult(outcome);
                return;
            }

            if (msg.startsWith("abdel_reveal:")) {
                // Abdel éliminé → annuler next_phase auto et aller vers feedback_defi
                nextPhaseCalled = true; // bloquer le timer auto
                localStorage.removeItem("currentDefi");
                localStorage.removeItem("defiOutcome");
                window.location.href = `feedback_defi.html?code=${partyCode}`;
                return;
            }

            // Défi du meeting → aller au feedback/débat
            // 🔥 FIX : Victime suivante dans la file → aller sur feedback_defi
            if (msg === "phase:defi_decision") {
                nextPhaseCalled = true; // Bloquer le timer auto du host
                localStorage.removeItem("currentDefi");
                localStorage.removeItem("defiOutcome");
                window.location.href = `feedback_defi.html?code=${partyCode}`;
                return;
            }

            if (msg === "phase:feedback" || msg === "phase:feedback:pre_vote") {
                localStorage.removeItem("currentDefi");
                localStorage.removeItem("defiOutcome");
                window.location.href = `feedback.html?code=${partyCode}&mode=pre_vote`;
                return;
            }

            // Défi du vote → meeting suivant
            if (msg.startsWith("next_meeting:")) {
                localStorage.removeItem("currentDefi");
                localStorage.removeItem("defiOutcome");
                window.location.href = `meeting1.html?code=${partyCode}`;
                return;
            }

            if (msg.startsWith("game_over:")) {
                const result = msg.split(":")[1];
                window.location.href = result === "victoire_collabs" ? "victoire.html" : result === "match_nul" ? "match_nul.html" : "defaite.html";
                return;
            }
        };

        // ---------------------------------------------------
        // Vérification immédiate au chargement (si verdict déjà disponible)
        // ---------------------------------------------------
        async function checkVerdict() {
            try {
                const res = await fetch(`${API_URL}/party/vote_result/${partyCode}`);
                if (!res.ok) return;
                const data = await res.json();

                if (data.game_over) {
                    window.location.href = data.winner === "Collaborateurs" ? "victoire.html" : "defaite.html";
                    return;
                }
                // Le verdict du défi arrive via WS, pas besoin d'autre logique ici
            } catch (e) {
                console.error("Erreur vérification verdict :", e);
            }
        }

        checkVerdict();

        // ---------------------------------------------------
        // Vérifier si le joueur est host
        // ---------------------------------------------------
        async function checkHost() {
            try {
                const res = await fetch(`${API_URL}/party/verify/${partyCode}`);
                const data = await res.json();
                return data.host_id === parseInt(playerId);
            } catch (e) {
                return false;
            }
        }

        // ---------------------------------------------------
        // Afficher le résultat
        // ---------------------------------------------------
        async function showResult(outcome) {
            if (resultShown) return;
            resultShown = true;

            document.getElementById("zoneWaiting").style.display = "none";
            document.getElementById("zoneResult").style.display = "block";

            const choMsg = document.getElementById("choMsg");
            const resultText = document.getElementById("resultText");
            const roleZone = document.getElementById("roleRevelationZone");
            roleZone.innerHTML = "";

            if (outcome === "success") {
                choMsg.innerHTML = "<strong>CHO :</strong> Performance validée par l'équipe !";
                resultText.textContent = `✅ Défi réussi ! ${eliminatedPseudo} sauve sa place et reste anonyme.`;
                resultText.className = "result-success";
            } else {
                choMsg.innerHTML = "<strong>CHO :</strong> Performance insuffisante. Licenciement acté.";
                resultText.textContent = `❌ Défi échoué ! ${eliminatedPseudo} est définitivement licencié(e).`;
                resultText.className = "result-fail";

                // Révéler le rôle de la victime
                try {
                    const res = await fetch(`${API_URL}/party/meeting_victim/${partyCode}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.victim && data.victim.role) {
                            const roleInfo = document.createElement("p");
                            roleInfo.style.cssText = "font-size:20px; font-weight:bold; margin-top:12px; color:#c0392b;";
                            roleInfo.textContent = `Rôle révélé : ${data.victim.role}`;
                            roleZone.appendChild(roleInfo);
                        }
                    }
                } catch (e) { /* pas grave */ }
            }

            // Seul le host peut déclencher la suite
            const isHost = await checkHost();
            if (isHost) {
                document.getElementById("btnNextStep").style.display = "inline-block";
            } else {
                document.getElementById("waitingNext").style.display = "block";
            }

            // 🔥 FIX : timer visible pour TOUS, mais seul le host (ou premier vivant si host mort) déclenche
            let autoLeft = 10;
            const autoTimerEl = document.createElement("p");
            autoTimerEl.style.cssText = "text-align:center;color:#888;font-style:italic;margin-top:10px;";
            autoTimerEl.textContent = `⏱ Suite dans ${autoLeft}s…`;
            document.getElementById("zoneResult").appendChild(autoTimerEl);
            const autoInterval = setInterval(async () => {
                autoLeft--;
                autoTimerEl.textContent = `⏱ Suite dans ${autoLeft}s…`;
                if (autoLeft <= 0) {
                    clearInterval(autoInterval);
                    autoTimerEl.textContent = "";
                    if (!nextPhaseCalled) {
                        // Vérifier host vivant ou premier vivant
                        const vRes = await fetch(`${API_URL}/party/verify/${partyCode}`);
                        const party = await vRes.json();
                        const aliveRes = await fetch(`${API_URL}/party/players/${party.party_id}`);
                        const players = await aliveRes.json();
                        const alivePlayers = players.filter(p => p.is_alive);
                        const isHostAlive = alivePlayers.some(p => p.id === party.host_id);
                        const effectiveHostId = isHostAlive
                            ? party.host_id
                            : (alivePlayers[0]?.id || null);

                        if (effectiveHostId === parseInt(playerId, 10)) {
                            nextPhaseCalled = true;
                            try {
                                await fetch(`${API_URL}/party/next_phase/${partyCode}`, { method: "POST" });
                            } catch (e) { console.error(e); }
                        }
                    }
                }
            }, 1000);
        }
        
        // ---------------------------------------------------
        // Le host déclenche la phase feedback pour tout le monde
        // ---------------------------------------------------
        document.getElementById("btnNextStep").addEventListener("click", async () => {
            document.getElementById("btnNextStep").disabled = true;
            document.getElementById("btnNextStep").textContent = "Synchronisation…";
            if (nextPhaseCalled) return;
            nextPhaseCalled = true;
            try {
                await fetch(`${API_URL}/party/next_phase/${partyCode}`, { method: "POST" });
                // Le broadcast "phase:feedback" est envoyé par le serveur → redirection via WS
            } catch (e) {
                console.error("Erreur next_phase :", e);
                document.getElementById("btnNextStep").disabled = false;
            }
        });
    </script>

</body>

</html>
