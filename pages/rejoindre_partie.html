<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejoindre une partie - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        @media (max-width: 768px) {
            .join-page {
                padding: 40px 28px !important;
                align-items: center !important;
            }

            .join-box {
                width: 100% !important;
                max-width: 100% !important;
                padding: 58px 34px !important;
                border-radius: 42px !important;
            }

            .join-box h1 {
                font-size: 46px !important;
                line-height: 1.1 !important;
                margin-bottom: 34px !important;
            }

            .join-box h2 {
                font-size: 24px !important;
                margin-bottom: 16px !important;
            }

            .join-box p {
                font-size: 20px !important;
            }

            .join-box input {
                padding: 24px !important;
                font-size: 20px !important;
                border-radius: 22px !important;
                margin-bottom: 18px !important;
            }

            .join-box .btn {
                padding: 26px !important;
                font-size: 22px !important;
                border-radius: 26px !important;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>

        <div class="nav-links">
            <a href="accueil.html">Accueil</a>
            <a href="https://corpolejeu.com/" target="_blank">Site officiel</a>
        </div>

        <div class="nav-user">
            <span id="userPseudo"></span>
        </div>
    </div>

    <main class="main join-page">
        <div class="box join-box">

            <h1>Rejoindre un meeting</h1>

            <h2>Meetings publiques disponibles</h2>
            <br>
            <div id="publicParties" class="public-list"></br>
                <p>Chargement des meetings publiques...</p>
            </div>

            <hr>

            <br>
            <p>Entrez le nom du meeting pour rejoindre.</p></br>
            <input type="text" id="code" placeholder="Nom du meeting…">
            <button class="btn" id="joinBtn">Rejoindre</button>
        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const savedPseudo = localStorage.getItem("pseudo");
        if (savedPseudo) document.getElementById("userPseudo").textContent = savedPseudo;

        // Si lien partagé avec ?name= → pré-remplir le champ
        const urlParams = new URLSearchParams(window.location.search);
        const nameFromUrl = urlParams.get("name");
        if (nameFromUrl) document.getElementById("code").value = nameFromUrl;

        async function loadPublicParties() {
            const response = await fetch(`${API_URL}/party/public`);
            const parties = await response.json();
            const container = document.getElementById("publicParties");
            container.innerHTML = "";

            if (parties.length === 0) {
                container.innerHTML = "<p>Aucun meeting public disponible.</p>";
                return;
            }

            parties.forEach(p => {
                const div = document.createElement("div");
                div.classList.add("public-party");
                div.innerHTML = `
            <p><strong>${p.name || "Meeting #" + p.party_id}</strong></p>
            <button onclick="joinByName('${p.name}')" class="btn">Rejoindre</button>
            <hr>
        `;
                container.appendChild(div);
            });
        }

        async function joinByName(name) {
            const pseudo = savedPseudo;
            if (!pseudo) { alert("Tu dois être connecté !"); return; }

            const response = await fetch(`${API_URL}/party/join_by_name`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pseudo, name })
            });
            const data = await response.json();

            if (!response.ok) { alert(data.detail || "Erreur"); return; }

            localStorage.setItem("playerId", data.player_id);
            localStorage.setItem("partyId", data.party_id);
            localStorage.setItem("partyCode", data.code);
            window.location.href = `lobby.html?code=${data.code}`;
        }

        document.getElementById("joinBtn").addEventListener("click", () => {
            const name = document.getElementById("code").value.trim();
            if (!name) { alert("Entre le nom du meeting !"); return; }
            joinByName(name);
        });

        loadPublicParties();
    </script>
    <script src="../assets/js/translate.js"></script>
    <script src="../assets/js/music.js"></script>


</body>


</html>
