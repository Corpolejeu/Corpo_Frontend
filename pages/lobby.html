<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        .player-list {
            margin-top: 20px;
            padding: 10px;
            background: #ffffffaa;
            border-radius: 10px;
        }

        .player-item {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .player-item:last-child {
            border-bottom: none;
        }

        #startBtn {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-links">
            <a href="accueil.html">Accueil</a>
            <a href="https://corpolejeu.com/" target="_blank">Site officiel</a>
        </div>
        <div class="nav-user">
            <span id="userPseudo"></span>
        </div>
    </div>

    <main class="main">
        <div class="box">

            <h1>Lobby</h1>
            <p>En attente des collaborateurs...</p>

            <h3>Code de la partie :</h3>
            <p id="partyCode" style="font-size:28px; font-weight:bold; letter-spacing:4px;"></p>

            <h3>Collaborateurs connectés :</h3>
            <div id="playersList" class="player-list">
                <p>Chargement...</p>
            </div>

            <p id="waitingMsg" style="color:#444; font-weight:bold; margin-top:15px;">
                En attente de 4 collaborateurs pour démarrer...
            </p>

        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code");

        const pseudo = localStorage.getItem("pseudo");
        const playerId = localStorage.getItem("playerId");

        document.getElementById("userPseudo").textContent = pseudo;
        document.getElementById("partyCode").textContent = code;

        fetch(`${API_URL}/party/verify/${code}`)
            .then(r => r.json())
            .then(d => { if (d.name) document.querySelector("h1").textContent = d.name; });

        localStorage.setItem("partyCode", code);

        let partyId = null;
        let hostId = null;
        let partyLaunched = false;

        // TIMER AUTO-START
        let autoStartTimer = null;
        let countdown = 20;

        // WebSocket
        const ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${code}?player_id=${playerId}`);

        ws.onopen = () => {
            console.log("Connexion WebSocket OK :", code);
        };

        ws.onmessage = (event) => {
            if (event.data === "start" || event.data === "phase:decouverte_role") {
                partyLaunched = true;
                window.location.href = `decouverte_role.html?code=${code}`;
            }
        };

        async function loadPartyInfo() {
            try {
                const res = await fetch(`${API_URL}/party/verify/${code}`);
                if (!res.ok) return;
                const data = await res.json();
                partyId = data.party_id;
                hostId = data.host_id;
            } catch (e) {
                console.error("Erreur loadPartyInfo :", e);
            }
        }

        async function loadPlayers() {
            if (!partyId) return;

            try {
                const res = await fetch(`${API_URL}/party/players/${partyId}`);
                if (!res.ok) return;
                const players = await res.json();

                const container = document.getElementById("playersList");
                container.innerHTML = "";

                players.forEach(p => {
                    const div = document.createElement("div");
                    div.classList.add("player-item");
                    div.textContent = p.pseudo;
                    container.appendChild(div);
                });

                const waitingMsg = document.getElementById("waitingMsg");

                // -----------------------------
                // AUTO-START LOGIC
                // -----------------------------
                if (players.length < 4) {
                    waitingMsg.textContent = `En attente de collaborateurs (${players.length}/4)...`;

                    if (autoStartTimer) {
                        clearInterval(autoStartTimer);
                        autoStartTimer = null;
                        countdown = 20;
                    }

                } else {
                    if (!autoStartTimer) {
                        countdown = 20;
                        waitingMsg.textContent = `4 collaborateurs présents ! Démarrage dans ${countdown}s...`;

                        autoStartTimer = setInterval(async () => {
                            countdown--;
                            waitingMsg.textContent = `4 collaborateurs présents ! Démarrage dans ${countdown}s...`;

                            if (countdown <= 0) {
                                clearInterval(autoStartTimer);
                                autoStartTimer = null;

                                try {
                                    const res = await fetch(`${API_URL}/party/start/${partyId}`, { method: "POST" });
                                    const data = await res.json();

                                    if (!res.ok) {
                                        alert(data.detail || "Impossible de lancer la partie.");
                                    }
                                } catch (e) {
                                    console.error("Erreur auto-start :", e);
                                }
                            }
                        }, 1000);
                    }
                }

            } catch (e) {
                console.error("Erreur loadPlayers :", e);
            }
        }

        async function initLobby() {
            await loadPartyInfo();
            await loadPlayers();
            setInterval(loadPlayers, 2000);
        }

        initLobby();

        // Heartbeat
        function sendHeartbeat() {
            if (playerId) {
                fetch(`${API_URL}/party/heartbeat/${playerId}`, { method: "POST" }).catch(() => { });
            }
        }
        sendHeartbeat();
        setInterval(sendHeartbeat, 5000);

        window.addEventListener("beforeunload", () => {
            if (!partyLaunched && playerId) {
                navigator.sendBeacon(`${API_URL}/party/leave/${playerId}`);
            }
        });
    </script>

    <script src="../assets/js/translate.js"></script>
    <script src="../assets/js/music.js"></script>
    <script src="../assets/js/motion.js"></script>



</body>

</html>
