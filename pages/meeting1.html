<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow-x: hidden;
        }

        .meeting-page {
            display: flex;
            gap: 25px;
            max-width: 1400px;
            margin: 35px auto;
            padding: 0 25px;
            align-items: flex-start;
            background: transparent !important;
        }

        .table-col {
            flex: 1;
            min-width: 0;
        }

        .box-table {
            padding: 30px;
            border-radius: 32px;
            background: rgba(255, 255, 255, .90);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, .10);
            animation: fadeUp .6s;
        }

        .box-table h2 {
            color: #ff3131;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
        }

        .oval-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 62%;
        }

        .oval-surface {
            position: absolute;
            inset: 12%;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255, 255, 255, .95), rgba(255, 245, 245, .95));
            border: 4px solid #ff3131;
            box-shadow:
                0 0 0 10px rgba(255, 49, 49, .08),
                0 15px 35px rgba(255, 49, 49, .18);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #tableTurnRole {
            font-size: 22px;
            font-weight: 800;
            color: #ff3131;
        }

        #tableTurnLabel {
            color: #999;
            font-size: 12px;
        }

        #timerCenter {
            font-size: 30px;
            font-weight: 800;
            color: #ff3131;
            margin-top: 8px;
        }

        #timerCenter.urgent {
            color: #ff3131;
            text-shadow: 0 0 14px rgba(255, 49, 49, .45);
            animation: blink .5s infinite alternate;
        }

        @keyframes blink {
            from {
                opacity: 1;
            }

            to {
                opacity: .45;
            }
        }

        .player-seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transform: translate(-50%, -50%);
        }

        .seat-avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            overflow: hidden;
            background: white;
            border: 3px solid rgba(255, 49, 49, .15);
            transition: .3s;
            position: relative;
        }

        .seat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .seat-avatar:hover {
            transform: scale(1.08);
        }

        .seat-avatar.me {
            border-color: #ff3131;
            box-shadow: 0 0 0 5px rgba(255, 49, 49, .15);
        }

        .seat-avatar.active {
            border-color: #ff3131;
            animation: pulseSeat 1s infinite;
        }

        @keyframes pulseSeat {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 49, 49, .5);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(255, 49, 49, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 49, 49, 0);
            }
        }

        .seat-avatar.neighbor {
            border-color: #ffb400;
            box-shadow: 0 0 20px rgba(255, 180, 0, .5);
        }

        .seat-avatar.dead {
            opacity: .35;
            filter: grayscale(1);
        }

        .seat-avatar.clickable {
            cursor: pointer;
        }

        .seat-avatar.clickable:hover {
            border-color: #ff3131;
        }

        .seat-name {
            font-size: 11px;
            font-weight: 700;
            color: #555;
            max-width: 65px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .seat-name.me {
            color: #ff3131;
        }

        .neighbor-badge {
            font-size: 9px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            border-radius: 5px;
            padding: 1px 5px;
            display: none;
        }

        .neighbor-badge.show {
            display: block;
        }

        .player-seat.selected .seat-avatar {
            border-color: #ff3131 !important;
            box-shadow: 0 0 14px rgba(255, 49, 49, .5) !important;
        }

        .action-col {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .box {
            padding: 22px;
            border-radius: 28px;
            background: rgba(255, 255, 255, .90);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, .08);
        }

        .box h3 {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ff3131;
            margin-bottom: 15px;
        }

        #myRoleBadge {
            padding: 16px;
            border-radius: 22px;
            background: linear-gradient(135deg, #ff3131, #ff5b5b);
            box-shadow: 0 10px 30px rgba(255, 49, 49, .30);
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            color: white;
        }

        #turnStatusText {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        #turnInstructionText {
            font-size: 12px;
            color: #999;
            font-style: italic;
            margin-top: 5px;
            line-height: 1.5;
        }

        .info-reveal {
            padding: 15px;
            border-radius: 18px;
            background: #fff5d6;
            border: 2px solid #ffd86b;
            color: #8a6800;
            font-size: 13px;
            font-weight: 600;
        }

        #playerGrid {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        #playerGrid.show {
            display: flex;
        }

        .player-select-card {
            width: 72px;
            padding: 10px;
            border-radius: 18px;
            background: rgba(255, 255, 255, .80);
            border: 2px solid transparent;
            transition: .25s;
            cursor: pointer;
            text-align: center;
        }

        .player-select-card:hover {
            transform: translateY(-3px);
            background: #fff1f1;
            border-color: #ff3131;
        }

        .player-select-card.selected {
            background: #ffe6e6;
            border-color: #ff3131;
            box-shadow: 0 6px 18px rgba(255, 49, 49, .20);
        }

        .player-select-card img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: auto;
        }

        .player-select-card span {
            font-size: 10px;
            font-weight: 700;
        }

        #selectedInfo {
            font-size: 12px;
            color: #27ae60;
            font-weight: 700;
            min-height: 16px;
            margin-bottom: 8px;
        }

        #actionButtons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #actionButtons .btn {
            padding: 15px;
            border: none;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
            color: white;
            width: 100%;
            text-align: left;
        }

        .btn-main {
            background: linear-gradient(135deg, #ff3131, #ff5a5a);
            box-shadow: 0 10px 30px rgba(255, 49, 49, .35);
        }

        .btn-ok {
            background: linear-gradient(135deg, #2ecc71, #48d987);
            box-shadow: 0 10px 30px rgba(46, 204, 113, .25);
        }

        .btn-skip {
            background: linear-gradient(135deg, #cfcfcf, #b9b9b9);
        }

        #actionButtons .btn:hover {
            transform: translateY(-4px);
        }

        #actionButtons .btn:active {
            transform: scale(.98);
        }

        #actionButtons .btn:disabled {
            opacity: .45;
            cursor: default;
        }

        #waitingMsg {
            font-size: 13px;
            color: #999;
            font-style: italic;
            padding: 6px 0;
        }

        @media(max-width: 900px) {
            .meeting-page {
                flex-direction: column;
                padding: 0 15px;
            }

            .action-col {
                width: 100%;
            }

            .oval-wrap {
                padding-bottom: 78%;
            }
        }

        @media(max-width: 768px) {

            .meeting-page {
                width: 100% !important;
                max-width: 100% !important;
                margin: 18px 0 !important;
                padding: 0 14px !important;
                gap: 14px !important;
                flex-direction: column !important;
                align-items: center !important;
            }

            .table-col,
            .action-col {
                width: 100% !important;
            }

            .box-table {
                width: 100% !important;
                padding: 14px !important;
                border-radius: 28px !important;
            }

            .oval-wrap {
                width: 100% !important;
                padding-bottom: 78% !important;
            }

            .oval-surface {
                inset: 9% !important;
            }

            .seat-avatar {
                width: 42px !important;
                height: 42px !important;
            }

            .seat-name {
                font-size: 10px !important;
                max-width: 58px !important;
            }

            #timerCenter {
                font-size: 28px !important;
            }

            #myRoleBadge {
                width: 100% !important;
                margin-top: 0 !important;
                font-size: 24px !important;
                padding: 22px !important;
                border-radius: 28px !important;
            }

            .box {
                width: 100% !important;
                padding: 24px !important;
                border-radius: 28px !important;
            }

            .box h3 {
                font-size: 22px !important;
            }

            #turnStatusText {
                font-size: 22px !important;
            }

            #turnInstructionText {
                font-size: 19px !important;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-links">
            <a href="accueil.html">Accueil</a>
        </div>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <div class="meeting-page">

        <!-- TABLE OVALE -->
        <div class="table-col">
            <div class="box-table">
                <h2>🏢 Meeting en cours</h2>
                <div class="oval-wrap" id="ovalWrap">
                    <div class="oval-surface">
                        <div id="tableTurnRole">En attente…</div>
                        <div id="tableTurnLabel">Le meeting va commencer</div>
                        <img id="roleImg" src="" alt=""
                            style="width:60px;height:60px;border-radius:50%;margin:6px auto;display:none;border:3px solid #ff3131;">
                        <div id="timerCenter">–</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PANNEAU DROIT -->
        <div class="action-col">

            <!-- Mon rôle -->
            <div id="myRoleBadge">🎭 Mon rôle : <span id="myRoleName">…</span></div>

            <!-- Tour en cours -->
            <div class="box">
                <h3>Tour en cours</h3>
                <div id="turnStatusText">En attente du meeting…</div>
                <div id="turnInstructionText"></div>
            </div>

            <!-- Info secrète (caché par défaut) -->
            <div class="box" id="infoBox" style="display:none;">
                <h3>🔒 Info secrète</h3>
                <div class="info-reveal" id="infoReveal"></div>
            </div>

            <!-- Action (mon tour) -->
            <div class="box" id="actionBox" style="display:none;">
                <h3>🎯 Ton action</h3>
                <div id="actionDesc"></div>
                <div id="playerGrid"></div>
                <div id="selectedInfo"></div>
                <div id="actionButtons"></div>
                <div id="waitingMsg" style="display:none;">⏳ Action envoyée… En attente du suivant.</div>
            </div>

        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code") || localStorage.getItem("partyCode");
        const playerId = localStorage.getItem("playerId");
        let playerRole = (localStorage.getItem("lastRole") || "").trim();
        const partyCode = localStorage.getItem("partyCode");
        const pseudo = localStorage.getItem("pseudo");

        document.getElementById("myRoleName").textContent = playerRole || "?";
        document.getElementById("userPseudo").textContent = pseudo;

        let ws = null, meetingStarted = false, readyInterval = null;
        let allPlayers = [], selectedTargetId = null;
        let displayTimerInterval = null, displayTimeLeft = 0;
        let myIndex = 0;

        const roleInstructions = {
            "Cindy": "Tes voisins gauche/droite sont mis en évidence. Attends l'info du CHO.",
            "Fabien": "Désigne secrètement un collaborateur à licencier.",
            "Claire": "Sauver la victime, désigner quelqu'un d'autre, ou passer (1 seule fois).",
            "Tiff": "Donne 3 mots interdits au CHO à voix haute, puis valide.",
            "Pascal": "Désigne un joueur pour savoir s'il est Manager.",
            "Stéphane": "Désigne un joueur pour révéler mutuellement vos identités.",
            "Denis": "Échange ton identité avec un autre joueur, ou passe.",
            "Abdel": "Désigne secrètement un joueur à contaminer.",
        };
        const roleInstructionsOthers = {
            "Cindy": "La secrétaire reçoit une info secrète sur ses voisins.",
            "Fabien": "Les Managers se concertent secrètement.",
            "Claire": "La RH décide du sort de la victime.",
            "Tiff": "Tiff donne 3 mots interdits au CHO.",
            "Pascal": "Pascal inspecte secrètement un joueur.",
            "Stéphane": "Stéphane révèle son identité à quelqu'un.",
            "Denis": "Denis échange éventuellement son identité.",
            "Abdel": "Abdel contamine secrètement un joueur.",
        };

        // ── CHARGER JOUEURS + TABLE ──
        async function loadPlayers() {
            try {
                const vRes = await fetch(`${API_URL}/party/verify/${code}`);
                const party = await vRes.json();
                const pRes = await fetch(`${API_URL}/party/players/${party.party_id}`);
                allPlayers = await pRes.json();
                buildTable();
            } catch (e) { console.error(e); }
        }

        function buildTable() {
            const wrap = document.getElementById("ovalWrap");
            wrap.querySelectorAll(".player-seat").forEach(s => s.remove());

            const total = allPlayers.length;
            myIndex = allPlayers.findIndex(p => p.id === parseInt(playerId));
            if (myIndex < 0) myIndex = 0;

            allPlayers.forEach((p, i) => {
                const offset = i - myIndex;
                const angle = (270 + (offset / total) * 360) * Math.PI / 180;
                const rx = 45, ry = 40;
                const x = 50 + rx * Math.cos(angle);
                const y = 50 + ry * Math.sin(angle);

                const isMe = p.id === parseInt(playerId);
                const lIdx = ((myIndex - 1) + total) % total;
                const rIdx = (myIndex + 1) % total;
                const isLeft = i === lIdx;
                const isRight = i === rIdx;

                const seat = document.createElement("div");
                seat.classList.add("player-seat");
                seat.id = `seat-${p.id}`;
                seat.style.left = `${x}%`;
                seat.style.top = `${y}%`;

                const roleImages = {
                    "Fabien": "Fabien.png", "Claire": "Claire.png",
                    "Pascal": "Pascal.png", "Tiff": "Tiff.png",
                    "Stéphane": "Stephane.png", "Cindy": "Cindy.png",
                    "Denis": "Denis.png", "Abdel": "Abdel.png"
                };
                const imgFile = (p.role && roleImages[p.role]) ? roleImages[p.role] : "joueur1.png";
                seat.innerHTML = `
                <div class="seat-avatar ${isMe ? 'me' : ''}" id="ring-${p.id}">
                    <img src="../assets/images/${!p.is_alive && p.role ? imgFile : 'joueur1.png'}" alt="${p.pseudo}">
                </div>

                <div class="seat-name ${isMe ? 'me' : ''}">${isMe ? '⭐ ' : ''}${p.pseudo}</div>
                <div class="neighbor-badge ${isLeft ? 'show' : ''}">◀ voisin</div>
                <div class="neighbor-badge ${isRight ? 'show' : ''}">voisin ▶</div>
            `;
                wrap.appendChild(seat);
            });
        }

        function highlightActiveSeat(role) {
            document.querySelectorAll(".seat-avatar").forEach(a => a.classList.remove("active"));
            if (role.trim().toLowerCase() === playerRole.trim().toLowerCase()) {
                const ring = document.getElementById(`ring-${playerId}`);
                if (ring) ring.classList.add("active");
            }
        }

        function highlightNeighbors(show) {
            const total = allPlayers.length;
            const li = allPlayers[((myIndex - 1) + total) % total];
            const ri = allPlayers[(myIndex + 1) % total];
            [li, ri].filter(Boolean).forEach(p => {
                const ring = document.getElementById(`ring-${p.id}`);
                if (ring) show ? ring.classList.add("neighbor") : ring.classList.remove("neighbor");
            });
        }

        // ── TIMER ──
        function startDisplayTimer(s) {
            clearInterval(displayTimerInterval);
            displayTimeLeft = s;
            const el = document.getElementById("timerCenter");
            el.classList.remove("urgent");
            el.textContent = `⏱ ${s}s`;
            displayTimerInterval = setInterval(() => {
                displayTimeLeft--;
                if (displayTimeLeft <= 0) { clearInterval(displayTimerInterval); el.textContent = "⌛"; el.classList.remove("urgent"); }
                else { el.textContent = `⏱ ${displayTimeLeft}s`; if (displayTimeLeft <= 8) el.classList.add("urgent"); }
            }, 1000);
        }

        // ── AFFICHER TOUR ──
        function showRoleTurn(role) {
            meetingStarted = true;
            const roleImagesMap = {
                "Fabien": "Fabien.png", "Claire": "Claire.png",
                "Pascal": "Pascal.png", "Tiff": "Tiff.png",
                "Stéphane": "Stephane.png", "Cindy": "Cindy.png",
                "Denis": "Denis.png", "Abdel": "Abdel.png"
            };
            const roleImg = document.getElementById("roleImg");
            if (roleImagesMap[role]) {
                roleImg.src = `../assets/images/${roleImagesMap[role]}`;
                roleImg.style.display = "block";
            } else {
                roleImg.style.display = "none";
            }
            if (readyInterval) { clearInterval(readyInterval); readyInterval = null; }

            document.getElementById("tableTurnRole").textContent = role;
            highlightActiveSeat(role);
            startDisplayTimer(25);

            const isMyTurn = role.trim().toLowerCase() === playerRole.trim().toLowerCase();

            if (isMyTurn) {
                document.getElementById("tableTurnLabel").textContent = "C'est TON tour !";
                document.getElementById("turnStatusText").innerHTML = `<strong style="color:#c0392b">🎤 C'est TON TOUR — ${role}</strong>`;
                document.getElementById("turnInstructionText").textContent = roleInstructions[role] || "";
                document.getElementById("actionBox").style.display = "block";
                document.getElementById("waitingMsg").style.display = "none";
                document.getElementById("actionButtons").innerHTML = "";
                document.getElementById("playerGrid").innerHTML = "";
                document.getElementById("playerGrid").classList.remove("show");
                document.getElementById("selectedInfo").textContent = "";
                showActionZone(role);
                if (role === "Cindy") highlightNeighbors(true);
            } else {
                document.getElementById("tableTurnLabel").textContent = "En action…";
                document.getElementById("turnStatusText").textContent = `👤 Tour de : ${role}`;
                document.getElementById("turnInstructionText").textContent = roleInstructionsOthers[role] || "";
                document.getElementById("actionBox").style.display = "none";
                document.getElementById("infoBox").style.display = "none";
            }
        }

        // ── ACTIONS ──
        function safeSend(data) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(data); }

        function sendAction(action, targetId = null) {
            const payload = { type: "action", action, playerId: parseInt(playerId), role: playerRole };
            if (targetId) payload.target_id = targetId;
            safeSend(JSON.stringify(payload));
            // Reset UI
            document.getElementById("actionButtons").innerHTML = "";
            document.getElementById("playerGrid").innerHTML = "";
            document.getElementById("playerGrid").classList.remove("show");
            document.getElementById("selectedInfo").textContent = "";
            document.getElementById("waitingMsg").style.display = "block";
            highlightNeighbors(false);
            document.querySelectorAll(".player-seat").forEach(s => s.classList.remove("selected"));
            document.querySelectorAll(".seat-avatar.clickable").forEach(a => { a.classList.remove("clickable"); a.parentElement.onclick = null; });
        }

        function buildPlayerGrid(includeEliminated = false) {
            const grid = document.getElementById("playerGrid");
            grid.innerHTML = ""; selectedTargetId = null;
            document.getElementById("selectedInfo").textContent = "";

            const filtered = allPlayers.filter(p => {
                if (p.id === parseInt(playerId)) return false;
                return includeEliminated ? !p.is_alive : p.is_alive;
            });

            if (!filtered.length) { grid.innerHTML = `<p style="font-size:12px;color:#aaa;">Aucun joueur disponible.</p>`; grid.classList.add("show"); return; }

            filtered.forEach(p => {
                const card = document.createElement("div");
                card.classList.add("player-select-card");
                card.innerHTML = `<img src="../assets/images/joueur1.png" alt="${p.pseudo}"><span>${p.pseudo}</span>`;
                card.onclick = () => {
                    document.querySelectorAll(".player-select-card").forEach(c => c.classList.remove("selected"));
                    document.querySelectorAll(".player-seat").forEach(s => s.classList.remove("selected"));
                    card.classList.add("selected");
                    selectedTargetId = p.id;
                    document.getElementById("selectedInfo").textContent = `✅ ${p.pseudo} sélectionné`;
                    const seat = document.getElementById(`seat-${p.id}`);
                    if (seat) seat.classList.add("selected");
                };
                grid.appendChild(card);
            });
            grid.classList.add("show");

            // Sièges cliquables sur la table
            filtered.forEach((p, idx) => {
                const seat = document.getElementById(`seat-${p.id}`);
                if (!seat) return;
                const ring = seat.querySelector(".seat-avatar");
                if (ring) ring.classList.add("clickable");
                seat.onclick = () => {
                    const card = grid.querySelectorAll(".player-select-card")[idx];
                    if (card) card.click();
                };
            });
        }

        function addBtn(container, label, cls, onClick) {
            const btn = document.createElement("button");
            btn.textContent = label; btn.className = `btn ${cls}`;
            btn.onclick = () => { btn.disabled = true; onClick(); };
            container.appendChild(btn);
        }

        // ── TIFFANY : choisir 3 mots parmi 5 ──
        async function loadTiffMots(desc, btns) {
            try {
                const res = await fetch(`${API_URL}/party/tiff/propose/${code}`);
                const data = await res.json();
                const mots = data.mots || [];

                desc.textContent = "Coche 3 mots parmi les 5 proposés — ils seront interdits dans le chat !";

                const grid = document.getElementById("playerGrid");
                grid.innerHTML = "";
                grid.style.display = "flex";
                grid.style.flexWrap = "wrap";
                grid.style.gap = "8px";
                grid.style.marginBottom = "10px";

                let selectedMots = [];

                mots.forEach(mot => {
                    const btn = document.createElement("button");
                    btn.textContent = mot;
                    btn.style.cssText = `padding:8px 12px; border:2px solid #ddd; border-radius:8px;
                    background:#fafafa; cursor:pointer; font-size:12px; font-weight:600;
                    transition:all .15s; color:#444;`;
                    btn.onclick = () => {
                        if (selectedMots.includes(mot)) {
                            selectedMots = selectedMots.filter(m => m !== mot);
                            btn.style.borderColor = "#ddd";
                            btn.style.background = "#fafafa";
                            btn.style.color = "#444";
                        } else if (selectedMots.length < 3) {
                            selectedMots.push(mot);
                            btn.style.borderColor = "#c0392b";
                            btn.style.background = "#fdecea";
                            btn.style.color = "#c0392b";
                        }
                        document.getElementById("selectedInfo").textContent =
                            selectedMots.length === 3 ? `✅ ${selectedMots.join(", ")}` : `${selectedMots.length}/3 mots sélectionnés`;
                    };
                    grid.appendChild(btn);
                });

                grid.classList.add("show");

                addBtn(btns, "✅ Valider mes 3 mots interdits", "btn-main", async () => {
                    if (selectedMots.length !== 3) { alert("Tu dois choisir exactement 3 mots !"); return; }
                    try {
                        await fetch(`${API_URL}/party/tiff/choisir`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ code, mots: selectedMots })
                        });
                        sendAction("done");
                    } catch (e) { console.error(e); }
                });
            } catch (e) {
                console.error(e);
                desc.textContent = "Donne 3 mots interdits au CHO à voix haute, puis valide.";
                addBtn(btns, "✅ Mots donnés au CHO", "btn-ok", () => sendAction("done"));
            }
        }

        function showActionZone(role) {
            const desc = document.getElementById("actionDesc");
            const btns = document.getElementById("actionButtons");
            btns.innerHTML = "";

            if (role === "Cindy") {
                desc.textContent = "Tes voisins sont mis en évidence. Attends l'info du CHO.";
                addBtn(btns, "✅ J'ai reçu l'info du CHO", "btn-ok", () => { highlightNeighbors(false); sendAction("done"); });
            } else if (role === "Tiff") {
                desc.textContent = "Choisis 3 mots secrets parmi les 5 proposés :";
                loadTiffMots(desc, btns);
            } else if (role === "Fabien") {
                desc.textContent = "Désigne secrètement un collaborateur à licencier :";
                buildPlayerGrid(false);
                const fabienBtn = document.createElement("button");
                fabienBtn.textContent = "✅ Valider ma victime";
                fabienBtn.className = "btn btn-main";
                fabienBtn.disabled = true; // 🔥 Désactivé tant qu'aucun joueur sélectionné
                fabienBtn.style.opacity = "0.4";
                fabienBtn.onclick = () => {
                    if (!selectedTargetId) return;
                    fabienBtn.disabled = true;
                    sendAction("manager_victim", selectedTargetId);
                };
                btns.appendChild(fabienBtn);

                // 🔥 Activer le bouton uniquement quand un joueur est sélectionné
                const origBuildGrid = buildPlayerGrid;
                const gridEl = document.getElementById("playerGrid");
                const observer = new MutationObserver(() => {
                    const selected = gridEl.querySelector(".player-select-card.selected");
                    fabienBtn.disabled = !selected;
                    fabienBtn.style.opacity = selected ? "1" : "0.4";
                });
                observer.observe(gridEl, { subtree: true, attributes: true, attributeFilter: ["class"] });
            } else if (role === "Claire") {
                desc.textContent = "Sauver la victime, désigner quelqu'un d'autre, ou passer (1 seule fois) :";
                buildPlayerGrid(false);
                addBtn(btns, "👍 Sauver la victime des Managers", "btn-ok", () => sendAction("claire_save"));
                addBtn(btns, "👎 Licencier le joueur sélectionné", "btn-main", () => {
                    if (!selectedTargetId) { alert("Sélectionne un joueur !"); return; }
                    sendAction("claire_fire", selectedTargetId);
                });
                addBtn(btns, "⏭ Passer sans agir", "btn-skip", () => sendAction("done"));
            } else if (role === "Pascal") {
                desc.textContent = "Désigne un joueur pour savoir s'il est Manager. Si oui, tu peux en désigner un 2ème (2 max) :";
                buildPlayerGrid(false);
                window._pascalInspectCount = 0;
                addBtn(btns, "🔍 Inspecter ce joueur", "btn-main", () => {
                    if (!selectedTargetId) { alert("Sélectionne un joueur !"); return; }
                    sendAction("pascal_inspect", selectedTargetId);
                });
            } else if (role === "Stéphane") {
                desc.textContent = "Clique sur un joueur pour révéler mutuellement vos identités :";
                buildPlayerGrid(false);
                addBtn(btns, "🤝 Révéler nos identités", "btn-main", () => {
                    if (!selectedTargetId) { alert("Sélectionne un joueur !"); return; }
                    sendAction("stephane_reveal", selectedTargetId);
                });

            } else if (role === "Denis") {
                desc.textContent = "Échange ton identité avec un autre joueur, ou passe :";
                buildPlayerGrid(false);
                addBtn(btns, "🔄 Échanger avec ce joueur", "btn-main", () => {
                    if (!selectedTargetId) { alert("Sélectionne un joueur !"); return; }
                    sendAction("denis_swap", selectedTargetId);
                });
                addBtn(btns, "⏭ Passer", "btn-skip", () => sendAction("done"));

            } else if (role === "Abdel") {
                desc.textContent = "Désigne secrètement un joueur à contaminer :";
                buildPlayerGrid(false);
                addBtn(btns, "🦠 Contaminer ce joueur", "btn-main", () => {
                    if (!selectedTargetId) { alert("Sélectionne un joueur !"); return; }
                    sendAction("abdel_virus", selectedTargetId);
                });
            }
        }

        // ── WS MESSAGES ──
        function handleWSMessage(msg) {
            console.log("📩", msg);

            if (msg === "phase:meeting_start") {
                meetingStarted = true;
                if (readyInterval) { clearInterval(readyInterval); readyInterval = null; }
                document.getElementById("tableTurnRole").textContent = "Meeting lancé !";
                document.getElementById("tableTurnLabel").textContent = "Premier tour…";
                return;
            }
            if (msg.startsWith("role:")) { showRoleTurn(msg.substring(5).trim()); return; }
            if (msg === "phase:defi_decision") { clearInterval(displayTimerInterval); window.location.href = `feedback_defi.html?code=${partyCode}`; return; }
            if (msg === "phase:feedback:pre_vote" || msg === "phase:feedback") { clearInterval(displayTimerInterval); window.location.href = `feedback.html?code=${partyCode}&mode=pre_vote`; return; }
            if (msg === "phase:vote") { clearInterval(displayTimerInterval); window.location.href = `vote.html?code=${partyCode}`; return; }
            if (msg.startsWith("next_meeting:")) { clearInterval(displayTimerInterval); window.location.href = `meeting1.html?code=${partyCode}`; return; }
            if (msg.startsWith("game_over:")) {
                const r = msg.split(":")[1];
                window.location.href = r === "victoire_collabs" ? "victoire.html" : r === "match_nul" ? "match_nul.html" : "defaite.html";
                return;
            }
            if (msg.startsWith("cindy_voisin:")) {
                // Signal privé pour Cindy — déjà géré via la route HTTP, mais fallback WS
                const hasManager = msg.split(":")[1] === "oui";
                document.getElementById("infoBox").style.display = "block";
                document.getElementById("infoReveal").textContent = hasManager
                    ? "👍 OUI — L'un de tes voisins est un Manager."
                    : "👎 NON — Aucun voisin n'est Manager.";
                return;
            }

            if (msg.startsWith("pascal_result:")) {
                const p = msg.split(":");
                const isManager = p[1] === "true";
                document.getElementById("infoBox").style.display = "block";
                const prev = document.getElementById("infoReveal").textContent;
                document.getElementById("infoReveal").textContent =
                    (prev ? prev + " | " : "") + (isManager ? `🔴 ${p[2]} EST un Manager !` : `🟢 ${p[2]} n'est PAS un Manager.`);

                window._pascalInspectCount = (window._pascalInspectCount || 0) + 1;

                if (isManager && window._pascalInspectCount < 2) {
                    // Peut inspecter un 2ème joueur
                    document.getElementById("actionBox").style.display = "block";
                    document.getElementById("waitingMsg").style.display = "none";
                    const btns = document.getElementById("actionButtons");
                    btns.innerHTML = "";
                    document.getElementById("actionDesc").textContent = "C'est un Manager ! Tu peux inspecter un 2ème joueur ou passer :";
                    buildPlayerGrid(false);
                    addBtn(btns, "🔍 Inspecter un 2ème joueur", "btn-main", () => {
                        if (!selectedTargetId) { alert("Sélectionne un joueur !"); return; }
                        sendAction("pascal_inspect", selectedTargetId);
                    });
                    addBtn(btns, "⏭ Terminer", "btn-skip", () => sendAction("done"));
                } else {
                    setTimeout(() => sendAction("done"), 5000);
                }
                return;
            }
            if (msg.startsWith("stephane_result:")) {
                const p = msg.split(":");
                document.getElementById("infoBox").style.display = "block";
                document.getElementById("infoReveal").textContent = `🤝 ${p[2]} est : ${p[1]} — garde ça secret !`;
                setTimeout(() => sendAction("done"), 5000);
                return;
            }
            if (msg.startsWith("stephane_reveal_target:")) {
                const p = msg.split(":");
                document.getElementById("infoBox").style.display = "block";
                document.getElementById("infoReveal").textContent = `🤝 ${p[2]} t'a révélé son identité : ${p[1]}`;
                return;
            }

            if (msg.startsWith("stephane_vu_claire:")) {
                document.getElementById("infoBox").style.display = "block";
                document.getElementById("infoReveal").textContent = `⚠️ Stéphane a vu Claire — il sera licencié en fin de meeting !`;
                return;
            }

            if (msg.startsWith("new_role:")) {
                const newRole = msg.substring(9);
                localStorage.setItem("lastRole", newRole);
                playerRole = newRole;
                document.getElementById("myRoleName").textContent = newRole;
                document.getElementById("infoBox").style.display = "block";
                document.getElementById("infoReveal").textContent = `🔄 Ton nouveau rôle est : ${newRole}`;
                return;
            }

            if (msg.startsWith("abdel_reveal:")) {
                const parts = msg.split(":");
                document.getElementById("infoBox").style.display = "block";
                document.getElementById("infoReveal").innerHTML =
                    `🦠 <strong>${parts[1]}</strong> était Abdel ! Ses victimes infectées : <strong>${parts[2]}</strong> — elles vont être licenciées !`;
                return;
            }
            if (msg.startsWith("player_eliminated_direct:") || msg.startsWith("player_fired:")) {
                loadPlayers();
                return;
            }
        }

        // ── WEBSOCKET ──
        function sendReady() {
            if (!meetingStarted && ws && ws.readyState === WebSocket.OPEN)
                ws.send(JSON.stringify({ type: "ready", player_id: playerId }));
        }

        function connectWS() {
            ws = new WebSocket(`wss://corpo-backend.onrender.com/ws/${code}?player_id=${playerId}`); ws.onopen = () => { sendReady(); if (!readyInterval) readyInterval = setInterval(sendReady, 2000); };
            ws.onmessage = (e) => handleWSMessage(e.data);
            ws.onclose = () => setTimeout(connectWS, 1000);
            ws.onerror = () => ws.close();
        }

        async function checkAliveAndInit() {
            try {
                const res = await fetch(`${API_URL}/party/is_alive/${playerId}`);
                const d = await res.json();
                if (!d.is_alive) { window.location.href = "salle_morts.html"; return; }
            } catch (e) { }
            await loadPlayers();
            connectWS();
        }

        checkAliveAndInit();
    </script>
    <script src="../assets/js/translate.js"></script>
    <script src="../assets/js/music.js"></script>
    <script src="../assets/js/motion.js"></script>


</body>
