<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Découverte du rôle - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .role-page {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 16px;
        }

        .role-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .role-header {
            background: #c0392b;
            padding: 24px;
            text-align: center;
            color: white;
        }

        .role-header h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: .8;
            margin-bottom: 16px;
        }

        /* Roue */
        .role-wheel {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 16px;
        }

        .wheel-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        .spin {
            animation: spinWheel 3s ease-out forwards;
        }

        @keyframes spinWheel {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(1440deg);
            }
        }

        .role-header h2 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
        }

        .role-title-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 13px;
            margin-top: 8px;
        }

        .role-team {
            font-size: 12px;
            margin-top: 8px;
            opacity: .7;
        }

        .role-body {
            padding: 24px;
        }

        /* Description */
        .role-description {
            font-size: 14px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 20px;
            font-style: italic;
            border-left: 3px solid #c0392b;
            padding-left: 14px;
        }

        /* Rôle pendant le meeting */
        .role-meeting-box {
            background: #fdecea;
            border: 2px solid #c0392b;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .role-meeting-box h3 {
            font-size: 12px;
            font-weight: 700;
            color: #c0392b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .role-meeting-box p {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        /* Phrase cliché */
        .role-cliche {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            font-size: 15px;
            color: #555;
            font-style: italic;
            margin-bottom: 20px;
        }

        .role-cliche::before {
            content: "💬 ";
        }

        /* Timer */
        #timerBar {
            background: #eee;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #timerFill {
            height: 100%;
            background: #c0392b;
            border-radius: 10px;
            transition: width 1s linear;
            width: 100%;
        }

        #timerText {
            font-size: 13px;
            color: #999;
            text-align: center;
        }

        /* Final role caché au début */
        #finalRole {
            display: none;
        }

        #finalRole.show {
            display: block;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>
        <div class="nav-user"><span id="userPseudo"></span></div>
    </div>

    <div class="role-page">
        <div class="role-card">

            <div class="role-header">
                <h1>Découverte du rôle</h1>

                <!-- Roue -->
                <div class="role-wheel" id="wheelZone">
                    <img id="wheelImg" class="wheel-img" src="../assets/images/joueur1.png">
                </div>

                <div id="finalRole">
                    <img id="roleImg" class="wheel-img" src=""
                        style="width:130px;height:130px;margin:0 auto 12px;display:block;">
                    <h2 id="roleName"></h2>
                    <div class="role-title-badge" id="roleTitle"></div>
                    <div class="role-team" id="roleTeam"></div>
                </div>
            </div>

            <div class="role-body" id="roleBody" style="display:none;">

                <!-- Description courte -->
                <div class="role-description" id="roleDesc"></div>

                <!-- Rôle pendant le meeting -->
                <div class="role-meeting-box">
                    <h3>🏢 Ton rôle pendant le meeting</h3>
                    <p id="roleMeeting"></p>
                </div>

                <!-- Phrase cliché -->
                <div class="role-cliche" id="roleCliche"></div>

                <!-- Timer -->
                <div id="timerBar">
                    <div id="timerFill"></div>
                </div>
                <div id="timerText">Meeting dans 15s…</div>

            </div>

        </div>
    </div>

    <audio id="wheelSound" src="../assets/sounds/roulette.mp3"></audio>

    <script>
        const API_URL = "https://corpo-backend.onrender.com";
        const pseudo = localStorage.getItem("pseudo");
        const playerId = localStorage.getItem("playerId");
        const partyCode = localStorage.getItem("partyCode");

        document.getElementById("userPseudo").textContent = pseudo;

        const DURATION = 15; // secondes avant redirection

        function startWheel() {
            const wheel = document.getElementById("wheelImg");
            const sound = document.getElementById("wheelSound");
            wheel.classList.add("spin");
            sound.currentTime = 0;
            sound.loop = true;
            sound.play().catch(() => { });
            setTimeout(() => { sound.pause(); sound.currentTime = 0; }, 3000);
        }

        async function loadRole() {
            try {
                const res = await fetch(`${API_URL}/party/role/${playerId}`);
                const data = await res.json();

                // Charger les infos complètes du rôle
                const roleRes = await fetch(`${API_URL}/party/role_info/${encodeURIComponent(data.role_name)}`);
                const roleInfo = await roleRes.json();

                startWheel();

                setTimeout(() => {
                    localStorage.setItem("lastRole", data.role_name);

                    // Cacher la roue, afficher le rôle
                    document.getElementById("wheelZone").style.display = "none";
                    document.getElementById("finalRole").classList.add("show");

                    document.getElementById("roleImg").src = "../assets/images/" + data.image;
                    document.getElementById("roleName").textContent = data.pseudo || data.role_name;
                    document.getElementById("roleTitle").textContent = roleInfo.title || data.role;
                    document.getElementById("roleTeam").textContent = "Équipe : " + data.team;

                    // Description
                    document.getElementById("roleDesc").textContent = roleInfo.description || "";
                    document.getElementById("roleMeeting").textContent = roleInfo.role_meeting || "";

                    // Phrase cliché aléatoire
                    const cliches = roleInfo.cliches || [];
                    document.getElementById("roleCliche").textContent =
                        cliches.length > 0 ? cliches[Math.floor(Math.random() * cliches.length)] : "";

                    document.getElementById("roleBody").style.display = "block";

                    startCountdown();
                }, 3000);

            } catch (e) {
                console.error("Erreur chargement rôle :", e);
            }
        }

        function startCountdown() {
            let timeLeft = DURATION;
            const fill = document.getElementById("timerFill");
            const text = document.getElementById("timerText");

            const interval = setInterval(() => {
                timeLeft--;
                fill.style.width = `${(timeLeft / DURATION) * 100}%`;
                text.textContent = `Meeting dans ${timeLeft}s…`;

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    window.location.href = `meeting1.html?code=${partyCode}`;
                }
            }, 1000);
        }

        loadRole();
    </script>
</body>

</html>
