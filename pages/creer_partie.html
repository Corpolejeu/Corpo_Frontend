<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une partie - Corpo!</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        @media (max-width: 768px) {
            .create-page {
                padding: 40px 28px !important;
                align-items: center !important;
            }

            .create-box {
                width: 100% !important;
                max-width: 100% !important;
                padding: 58px 34px !important;
                border-radius: 42px !important;
            }

            .create-box h1 {
                font-size: 46px !important;
                line-height: 1.1 !important;
                margin-bottom: 34px !important;
            }

            .create-box p {
                font-size: 20px !important;
                line-height: 1.45 !important;
            }

            .create-box input {
                padding: 24px !important;
                font-size: 20px !important;
                border-radius: 22px !important;
            }

            .private-checkbox {
                font-size: 22px !important;
                margin: 26px 0 !important;
                gap: 18px !important;
            }

            .private-checkbox input[type="checkbox"] {
                width: 38px !important;
                height: 38px !important;
            }

            .create-box .btn {
                padding: 26px !important;
                font-size: 22px !important;
                border-radius: 26px !important;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="accueil.html" class="logo">Corpo! Le jeu</a>

        <div class="nav-links">
            <a href="accueil.html">Accueil</a>
            <a href="https://corpolejeu.com/" target="_blank">Site officiel</a>
        </div>

        <div class="nav-user">
            <span id="userPseudo"></span>
        </div>
    </div>

    <main class="main create-page">
        <div class="box create-box">
            <h1>Créer un meeting</h1>

            <p>Entrez le nom de votre entreprise de rêve !</p>

            <input type="text" id="partyName" placeholder="Ex: Venez jouer !">

            <br><label class="private-checkbox">
                <input type="checkbox" id="isPrivate">
                <span>Meeting privé</span>
            </label></br>

            <button class="btn" id="createBtn">Créer un meeting</button>
            <div id="shareLink" style="display:none; margin-top:16px;">
                <p style="font-weight:700;color:#c0392b;">🔗 Partage ce lien avec tes potes :</p>
                <input type="text" id="shareLinkInput" readonly
                    style="width:100%;padding:10px;border-radius:8px;border:2px solid #c0392b;font-size:13px;">
                <button onclick="navigator.clipboard.writeText(document.getElementById('shareLinkInput').value)"
                    class="btn" style="margin-top:8px;width:100%;">📋 Copier le lien</button>
            </div>
        </div>
    </main>

    <div class="footer">
        <p>&copy; 2026 Corpo! – Tous droits réservés</p>
    </div>

    <script>
        const savedPseudo = localStorage.getItem("pseudo");

        if (savedPseudo) {
            const el = document.getElementById("userPseudo");
            if (el) el.textContent = savedPseudo;
        }

        document.getElementById("createBtn").addEventListener("click", async () => {
            const partyName = document.getElementById("partyName").value.trim();
            const isPrivate = document.getElementById("isPrivate").checked;

            if (!partyName) { alert("Veuillez entrer un nom !"); return; }
            if (!savedPseudo) { alert("Tu dois être connecté !"); return; }

            const btn = document.getElementById("createBtn");
            btn.disabled = true;
            btn.textContent = "⏳ Création en cours…";

            try {
                const response = await fetch("https://corpo-backend.onrender.com/party/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pseudo: savedPseudo, name: partyName, is_private: isPrivate })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("partyCode", data.code);
                    localStorage.setItem("playerId", data.player_id);

                    if (isPrivate) {
                        // Afficher le lien à partager
                        const link = `https://corpo-frontend.onrender.com/pages/lobby.html?code=${data.code}`; document.getElementById("shareLink").style.display = "block";
                        document.getElementById("shareLinkInput").value = link;
                        document.getElementById("shareLinkInput").select();
                        btn.textContent = "✅ Meeting créé !";
                        setTimeout(() => window.location.href = `lobby.html?code=${data.code}`, 7000);
                    } else {
                        window.location.href = `lobby.html?code=${data.code}`;
                    }
                } else {
                    alert(data.detail || "Erreur");
                    btn.disabled = false;
                    btn.textContent = "Créer un meeting";
                }
            } catch (e) {
                alert("Erreur serveur !");
                btn.disabled = false;
                btn.textContent = "Créer un meeting";
            }
        });
    </script>
    <script src="../assets/js/translate.js"></script>
    <script src="../assets/js/music.js"></script>



</body>

</html>
